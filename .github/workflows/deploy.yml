name: Deploy na VH.pl

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zainstaluj lftp
        run: sudo apt-get install -y lftp

      - name: Wgraj na serwer FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open -u vh16153,${{ secrets.FTP_PASSWORD }} ftp.vh16153.vh.net.pl;
            mirror --reverse --delete --verbose \
              --exclude .git \
              --exclude .github \
              --exclude aktualizuj.bat \
              ./ public_html/
          "
